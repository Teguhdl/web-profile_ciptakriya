<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .group { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px 20px; }
  .glabel { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  h3 { font-family: var(--font-display); font-size: 17px; color: var(--cke-navy-700); margin: 2px 0 0; }
  .muted { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Card } = window.CiptaKriyaEngineeringDesignSystem_d6b0c6;
    function Demo() {
      return (
        <div className="stack">
          <div className="group">
            <div className="glabel">Button — variants &amp; sizes</div>
            <div className="row" style={{ marginBottom: 12 }}>
              <Button variant="primary">Hubungi Kami</Button>
              <Button variant="secondary">Lihat Proyek</Button>
              <Button variant="outline">Selengkapnya</Button>
              <Button variant="ghost" iconRight={<span>→</span>}>Read more</Button>
            </div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg">Large</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>
          <div className="group">
            <div className="glabel">Badge — tones</div>
            <div className="row">
              <Badge tone="brand">Mekanikal</Badge>
              <Badge tone="green">Elektrikal</Badge>
              <Badge tone="success" dot>Selesai</Badge>
              <Badge tone="warning" dot>Berjalan</Badge>
              <Badge tone="outline">SCG Readymix</Badge>
              <Badge tone="solid">2026</Badge>
            </div>
          </div>
          <div className="group">
            <div className="glabel">Card — interactive + accent</div>
            <div className="cards">
              <Card interactive accent media="../../assets/photos/batching-plant.png" mediaHeight={120}>
                <Badge tone="brand">Batching Plant</Badge>
                <h3>Cimareme</h3>
                <p className="muted">PT SCG Readymix · 2025</p>
              </Card>
              <Card interactive accent media="../../assets/photos/silo-fabrication.png" mediaHeight={120}>
                <Badge tone="green">Fabrikasi</Badge>
                <h3>Silo Pabrikasi</h3>
                <p className="muted">Storage Tank · 2024</p>
              </Card>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
