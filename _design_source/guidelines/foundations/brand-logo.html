<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Gear + leaf mark — primary, on light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); display: flex; gap: 28px; align-items: center; }
  .panel { flex: 1; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); height: 150px; display: flex; align-items: center; justify-content: center; }
  .panel.tint { background: var(--cke-blue-50); border-color: var(--cke-blue-100); }
  img { height: 96px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 8px; text-align: center; }
  .wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="wrap" style="flex:1"><div class="panel"><img src="../../assets/logo/cke-logomark.png" alt="CKE logo"></div><div class="cap">on white / steel-0</div></div>
  <div class="wrap" style="flex:1"><div class="panel tint"><img src="../../assets/logo/cke-logomark-transparent.png" alt="CKE logo"></div><div class="cap">on blue-50 tint</div></div>
</body>
</html>
