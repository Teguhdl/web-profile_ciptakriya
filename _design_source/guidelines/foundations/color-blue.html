<!-- @dsCard group="Colors" viewport="700x150" name="Engineering Blue" subtitle="Primary brand ramp — the logo gear" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; line-height: 1.3; }
  .n { font-weight: 600; }
  .h { opacity: 0.75; }
  .lite span { color: var(--cke-navy-700); }
  .dark span { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--cke-blue-50)"><span class="n">50</span><span class="h">#ecf8fc</span></div>
    <div class="sw lite" style="background:var(--cke-blue-100)"><span class="n">100</span><span class="h">#cfedf7</span></div>
    <div class="sw lite" style="background:var(--cke-blue-200)"><span class="n">200</span><span class="h">#a3dcee</span></div>
    <div class="sw lite" style="background:var(--cke-blue-300)"><span class="n">300</span><span class="h">#6dc6e2</span></div>
    <div class="sw lite" style="background:var(--cke-blue-400)"><span class="n">400</span><span class="h">#3fb1d6</span></div>
    <div class="sw dark" style="background:var(--cke-blue-500)"><span class="n">500 ●</span><span class="h">#2299c4</span></div>
    <div class="sw dark" style="background:var(--cke-blue-600)"><span class="n">600</span><span class="h">#167ea7</span></div>
    <div class="sw dark" style="background:var(--cke-blue-700)"><span class="n">700</span><span class="h">#156888</span></div>
    <div class="sw dark" style="background:var(--cke-blue-800)"><span class="n">800</span><span class="h">#17556f</span></div>
    <div class="sw dark" style="background:var(--cke-blue-900)"><span class="n">900</span><span class="h">#16475d</span></div>
  </div>
</body>
</html>
