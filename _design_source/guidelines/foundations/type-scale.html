<!-- @dsCard group="Type" viewport="700x290" name="Type Scale" subtitle="Major-third ramp, 11 → 76px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding: 5px 0; }
  .line:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 86px; flex-shrink: 0; }
  .spec { font-family: var(--font-display); font-weight: 700; color: var(--cke-navy-700); letter-spacing: -0.02em; line-height: 1.1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tok">5xl · 76</span><span class="spec" style="font-size:48px">Batching Plant</span></div>
  <div class="line"><span class="tok">3xl · 46</span><span class="spec" style="font-size:38px">Mechanical</span></div>
  <div class="line"><span class="tok">2xl · 36</span><span class="spec" style="font-size:30px">Electrical Install</span></div>
  <div class="line"><span class="tok">xl · 28</span><span class="spec" style="font-size:24px">Fabrication &amp; Modification</span></div>
  <div class="line"><span class="tok">lg · 22</span><span class="spec" style="font-size:20px">Warehousing Solutions</span></div>
  <div class="line"><span class="tok">base · 16</span><span class="spec" style="font-size:16px; font-weight:400; font-family:var(--font-body)">Body copy in IBM Plex Sans</span></div>
</body>
</html>
