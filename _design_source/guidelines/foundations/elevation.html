<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Cool steel-tinted shadow ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 30px 24px; background: var(--surface-page); font-family: var(--font-mono); }
  .row { display: flex; gap: 22px; }
  .item { text-align: center; }
  .box { width: 96px; height: 70px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-size: 10px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md · card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-brand); background:var(--cke-blue-500)"></div><div class="lbl">brand glow</div></div>
  </div>
</body>
</html>
