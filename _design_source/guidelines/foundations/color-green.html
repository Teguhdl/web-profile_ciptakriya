<!-- @dsCard group="Colors" viewport="700x150" name="Leaf Green" subtitle="Secondary brand ramp — the logo leaf" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; line-height: 1.3; }
  .n { font-weight: 600; }
  .h { opacity: 0.75; }
  .lite span { color: var(--cke-green-900); }
  .dark span { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--cke-green-50)"><span class="n">50</span><span class="h">#f3f8e9</span></div>
    <div class="sw lite" style="background:var(--cke-green-100)"><span class="n">100</span><span class="h">#e3efc8</span></div>
    <div class="sw lite" style="background:var(--cke-green-200)"><span class="n">200</span><span class="h">#cbe293</span></div>
    <div class="sw lite" style="background:var(--cke-green-300)"><span class="n">300</span><span class="h">#afd055</span></div>
    <div class="sw lite" style="background:var(--cke-green-400)"><span class="n">400</span><span class="h">#93bb39</span></div>
    <div class="sw dark" style="background:var(--cke-green-500)"><span class="n">500 ●</span><span class="h">#74a22b</span></div>
    <div class="sw dark" style="background:var(--cke-green-600)"><span class="n">600</span><span class="h">#5a8121</span></div>
    <div class="sw dark" style="background:var(--cke-green-700)"><span class="n">700</span><span class="h">#46641d</span></div>
    <div class="sw dark" style="background:var(--cke-green-800)"><span class="n">800</span><span class="h">#3a511c</span></div>
    <div class="sw dark" style="background:var(--cke-green-900)"><span class="n">900</span><span class="h">#31451b</span></div>
  </div>
</body>
</html>
