<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 7px; }
  .tok { font-size: 11px; color: var(--text-muted); width: 130px; flex-shrink: 0; }
  .bar { height: 16px; background: var(--cke-blue-500); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="tok">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--space-5 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--space-6 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--space-8 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">--space-9 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tok">--space-10 · 80</span><div class="bar" style="width:80px"></div></div>
</body>
</html>
