<!-- @dsCard group="Colors" viewport="700x150" name="Steel Neutrals" subtitle="Cool-gray industrial scale for surfaces & text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-mono); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .sw span { font-size: 10px; line-height: 1.3; }
  .n { font-weight: 600; }
  .h { opacity: 0.7; }
  .lite span { color: var(--cke-steel-700); }
  .dark span { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lite" style="background:var(--cke-steel-0)"><span class="n">0</span><span class="h">#ffffff</span></div>
    <div class="sw lite" style="background:var(--cke-steel-50)"><span class="n">50</span><span class="h">#f5f7f9</span></div>
    <div class="sw lite" style="background:var(--cke-steel-100)"><span class="n">100</span><span class="h">#eceff2</span></div>
    <div class="sw lite" style="background:var(--cke-steel-200)"><span class="n">200</span><span class="h">#dde2e7</span></div>
    <div class="sw lite" style="background:var(--cke-steel-300)"><span class="n">300</span><span class="h">#c4ccd4</span></div>
    <div class="sw lite" style="background:var(--cke-steel-400)"><span class="n">400</span><span class="h">#9aa5b1</span></div>
    <div class="sw dark" style="background:var(--cke-steel-500)"><span class="n">500</span><span class="h">#6f7c8a</span></div>
    <div class="sw dark" style="background:var(--cke-steel-600)"><span class="n">600</span><span class="h">#515c69</span></div>
    <div class="sw dark" style="background:var(--cke-steel-700)"><span class="n">700 ● body</span><span class="h">#3c454f</span></div>
    <div class="sw dark" style="background:var(--cke-steel-900)"><span class="n">900</span><span class="h">#1a1f25</span></div>
  </div>
</body>
</html>
